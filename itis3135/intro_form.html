<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sasha Chernoivan's Sweet Cat | ITIS3135 | Introduction Form</title>
        <link rel="stylesheet" href="styles/default.css">
        <link rel="stylesheet" href="styles/intro_form.css">
        <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
        <script src="scripts/introduction.js"></script>
        <script src="scripts/generate_html.js"></script>
        <script src="scripts/generate_json.js"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    </head>
    <body>
        <div data-include="components/header.html"></div>
        <header>
            <h2>Introduction Form</h2>
        </header>
        <main>
            <h3>Please submit the form below.</h3>
            <form id="intro_form">
                <fieldset>
                    <legend>Personal Information</legend>
                    <label>First Name: 
                        <input type="text" class="" name="firstName" value="Sasha" placeholder="First Name" required>
                    </label><br>
                    <label>Middle Name/Initial (Optional): 
                        <input type="text" name="middleName" value="" placeholder="Middle Name">
                    </label><br>
                    <label>Nickname (Optional):
                        <input type="text" name="nickname" value="" placeholder="Nickname">
                    </label><br>
                    <label>Last Name: 
                        <input type="text" name="lastName" value="Chernoivan" placeholder="Last Name" required>
                    </label><br>
                    <label>Acknowledgment Statement:
                        <input type="text" name="ackStatement" value="I understand that what I put here is publicly available on the web and I won't put anything here I don't want the public to see" placeholder="Enter Acknowledgment Statement" required>
                    </label><br>
                    <label>Acknowledgment Date (MM-DD-YYYY): 
                        <input type="date" name="ackDate" value="2026-01-13" required>
                    </label><br>
                    <label>Mascot Adjective:
                        <input type="text" name="mascotAdj" value="Sweet" placeholder="Mascot Adjective" required>
                    </label><br>
                    <label>Mascot Animal: 
                        <input type="text" name="mascotAnimal" value="Cat" placeholder="Mascot Animal" required>
                    </label><br>
                    <label>Divider: 
                        <input type="text" name="divider" value="|" placeholder="Divider" required>
                    </label>
                </fieldset>
                <br>
                <fieldset>
                    <legend>Image</legend>
                    <label>
                        <input type="file" id="imageInput" accept="image/*">
                    </label><br><br>
                    <label>Picture Caption:
                        <input type="text" name="picCaption" value="One of my favorite beach spots in California." placeholder="Caption" required>
                    </label><br>
                </fieldset>
                <br>
                <fieldset>
                    <legend>Background</legend>
                    <label>Personal Statement:
                        <textarea name="personalStatement" placeholder="Personal Statement" required>I just transferred to UNC Charlotte from CPCC and I am a junior studying computer science with a concentration in Web/Mobile Development and Software Engineering.</textarea>
                    </label><br>
                    <label>Personal Background:
                        <textarea name="personalBackground" placeholder="Personal Background" required>I am 21 years old and I love photography, painting, and traveling.</textarea>
                    </label><br>
                    <label>Professional Background:
                        <textarea name="professionalBackground" placeholder="Professional Background" required>I have been working in retail for a few years.</textarea>
                    </label><br>
                    <label>Academic Background:
                        <textarea name="academicBackground" placeholder="Academic Background" required>I just transferred to UNC Charlotte this semester after completing my associate degree from CPCC. I am a junior studying computer science with a concentration in Web/Mobile Development and Software Engineering.</textarea>
                    </label><br>
                    <label>Background in this Subject:
                        <textarea name="subjectBackground" placeholder="Subject Background" required> I have limited experience in web development but I have experience in programming using Java.</textarea>
                    </label><br>
                    <label>Primary Work Computer:
                        <textarea name="primaryComp" placeholder="Primary Computer" required>The laptop I use for school is a Macbook Pro 13-inch M1.</textarea>
                    </label><br>
                    <label>Backup Work Computer & Location Plan:
                        <textarea name="backupComp" placeholder="Backup Computer" required>I have a Windows PC computer at home I can use as a backup.</textarea>
                    </label><br>
                </fieldset>
                <br>
                <fieldset>
                    <legend>Courses</legend>
                    <div id="courses">
                        <div data-course>
                            <input type="text" class="course-dept" name="course-dept[]" value="ITSC" placeholder="Course Department" required>
                            <input type="text" class="course-num" name="course-num[]" value="2600" placeholder="Course Number" required>
                            <input type="text" class="course-name" name="course-name[]" value="Computer Science Program, Identity, Career" placeholder="Course Name" required>
                            <input type="text" class="course-reason" name="course-reason[]" value="Required course." placeholder="Course Reason" required>
                            <button type="button" class="delete-course" data-coursedelete>Delete</button>
                        </div>
                        <div data-course>
                            <input type="text" class="course-dept" name="course-dept[]" value="ITIS" placeholder="Course Department" required>
                            <input type="text" class="course-num" name="course-num[]" value="3130" placeholder="Course Number" required>
                            <input type="text" class="course-name" name="course-name[]" value="Introduction to Human-Centered Computing" placeholder="Course Name" required>
                            <input type="text" class="course-reason" name="course-reason[]" value="I thought this would be an interesting course." placeholder="Course Reason" required>
                            <button type="button" class="delete-course" data-coursedelete>Delete</button>
                        </div>
                        <div data-course>
                            <input type="text" class="course-dept" name="course-dept[]" value="ITIS" placeholder="Course Department" required>
                            <input type="text" class="course-num" name="course-num[]" value="3135" placeholder="Course Number" required>
                            <input type="text" class="course-name" name="course-name[]" value="Front-End Web Application Development" placeholder="Course Name" required>
                            <input type="text" class="course-reason" name="course-reason[]" value="Useful course." placeholder="Course Reason" required>
                            <button type="button" class="delete-course" data-coursedelete>Delete</button>
                        </div>
                        <div data-course>
                            <input type="text" class="course-dept" name="course-dept[]" value="ITSC" placeholder="Course Department" required>
                            <input type="text" class="course-num" name="course-num[]" value="3688" placeholder="Course Number" required>
                            <input type="text" class="course-name" name="course-name[]" value="Computers and Their Impact on Society" placeholder="Course Name" required>
                            <input type="text" class="course-reason" name="course-reason[]" value="Required course." placeholder="Course Reason" required>
                            <button type="button" class="delete-course" data-coursedelete>Delete</button>
                        </div>
                        <div data-course>
                            <input type="text" class="course-dept" name="course-dept[]" value="ITCS" placeholder="Course Department" required>
                            <input type="text" class="course-num" name="course-num[]" value="3112" placeholder="Course Number" required>
                            <input type="text" class="course-name" name="course-name[]" value="Design Implementation of Object-Oriented Systems" placeholder="Course Name" required>
                            <input type="text" class="course-reason" name="course-reason[]" value="I thought this course would be useful and it is a required course." placeholder="Course Reason" required>
                            <button type="button" class="delete-course" data-coursedelete>Delete</button>
                        </div>
                    </div>
                    <button type="button" class="add-course" id="addCourseBtn">Add Another Course</button>
                </fieldset>
                <br>
                <fieldset>
                    <legend>Extras</legend>
                    <label>Funny/Interesting item to remember me by (Optional):
                        <input type="text" name="funnyItem" value="" placeholder="Funny thing about you">
                    </label><br>
                    <label>I'd also like to share (Optional):
                        <input type="text" name="addText" value="" placeholder="Additional text">
                    </label><br>
                    <label>Quote:
                        <input type="text" name="quote" value="Life is short, the world is wide, and I want to make some memories." placeholder="Quote" required>
                    </label><br>
                    <label>Quote Author:
                        <input type="text" name="quoteAuthor" value="Donna Sheridan" placeholder="Quote Author" required>
                    </label><br>
                </fieldset>
                <br>
                <fieldset>
                    <legend>Links</legend>
                    <div id="websites">
                        <div data-website>
                            <label>Website Name:
                                <input type="text" class="website-name" name="urlname[]" value="GitHub" placeholder="Website Name" required>
                            </label>
                            <label>URL:
                                <input type="url" class="link-url" name="url[]" value="https://github.com/achernoi" placeholder="URL" required>
                            </label>
                            <button type="button" class="delete-link" data-websitedelete>Delete</button>
                        </div>
                        <div data-website>
                            <label>Website Name:
                                <input type="text" class="website-name" name="urlname[]" value="GitHub.io" placeholder="Website Name" required>
                            </label>
                            <label>URL:
                                <input type="url" class="link-url" name="url[]" value="https://achernoi.github.io" placeholder="URL" required>
                            </label>
                            <button type="button" class="delete-link" data-websitedelete>Delete</button>
                        </div>
                        <div data-website>
                            <label>Website Name:
                                <input type="text" class="website-name" name="urlname[]" value="CLTWeb" placeholder="Website Name" required>
                            </label>
                            <label>URL:
                                <input type="url" class="link-url" name="url[]" value="https://webpages.charlotte.edu/achernoi/" placeholder="URL" required>
                            </label>
                            <button type="button" class="delete-link" data-websitedelete>Delete</button>
                        </div>
                        <div data-website>
                            <label>Website Name:
                                <input type="text" class="website-name" name="urlname[]" value="ITIS3135" placeholder="Website Name" required>
                            </label>
                            <label>URL:
                                <input type="url" class="link-url" name="url[]" value="https://achernoi.github.io/itis3135/index.html" placeholder="URL" required>
                            </label>
                            <button type="button" class="delete-link" data-websitedelete>Delete</button>
                        </div>
                        <div data-website>
                            <label>Website Name:
                                <input type="text" class="website-name" name="urlname[]" value="LinkedIn" placeholder="Website Name" required>
                            </label>
                            <label>URL:
                                <input type="url" class="link-url" name="url[]" value="https://www.linkedin.com/in/sashachernoivan/" placeholder="URL" required>
                            </label>
                            <button type="button" class="delete-link" data-websitedelete>Delete</button>
                        </div>
                    </div>
                    <button type="button" id="addWebsiteLinkBtn">Add Link</button>
                </fieldset>
                <div><br>
                        <button type="submit" id="submitBtn">Submit</button>
                        <button type="reset" id="resetBtn">Reset</button>
                        <button type="button" id="clearButton">Clear</button>
                        <button type="button" id="generateHtml" onclick="generateHtml();">Generate HTML</button>
                        <button type="button" id="generateJson" onclick="generateJson();">Generate JSON</button>
                    </div>
                <br>
            </form>
            <div id="output_result" style="display: none"></div>
        </main>
        <div data-include="components/footer.html"></div>
        <script src="scripts/HTMLInclude.min.js"></script>
    </body>
</html>
