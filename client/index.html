<!DOCTYPE html>
<html lang="en">
<head>
    <title>The Garden Hub</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>
<body>

<div data-include="components/header.html"></div>

<main>
    <h2>Welcome</h2>
    <p style="text-align: left;">Learn how to grow your own plants with simple guides and tools.</p>

    <p id="loading">Loading plants...</p>
    <div style="display: flex; justify-content: center;">
        <img id="plantImage" src="images/garden.png" alt="Garden images" style="height: 400px; width: 550px;"/>
    </div>

    <p id="counter" style="text-align: center;"></p>

    <div style="text-align: center;">
        <button onclick="firstImage()">First</button>
        <button onclick="prevImage()">Previous</button>
        <button onclick="nextImage()">Next</button>
        <button onclick="lastImage()">Last</button>
    </div>

    <div style="margin-top:10px; text-align: center;">
        <button onclick="playSlideshow()">Play</button>
        <button onclick="stopSlideshow()">Stop</button>
    </div>
    <script src="scripts/slideshow.js"></script>

    <h3>Featured Tips</h3>
    <ul>
        <li>Start with easy plants</li>
        <li>Water regularly</li>
        <li>Choose sunny areas</li>
    </ul>
</main>

<div data-include="components/footer.html"></div>
<script src="scripts/HTMLInclude.min.js"></script>

</body>
</html>
