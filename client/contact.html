<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>
<body>

<div data-include="components/header.html"></div>

<main>
    <h3>Contact Us</h3>
    <p>Have a gardening question, suggestion, or something you're stuck on? Whether you're trying your first plant or 
        you have a garden issue, feel free to reach out. Please fill out the form below to contact us:
    </p>
<form onsubmit="return validateForm()">
    <p>Enter your name:</p>
    <input type="text" id="name" placeholder="Your full name"><br>
    <p>Enter your email:</p>
    <input type="text" id="email" placeholder="yourname@example.com"><br>
    <p>Enter your message:</p>
    <textarea id="message" placeholder="Your message for us"></textarea><br>
    <input type="submit">
</form>
</main>

<div data-include="components/footer.html"></div>
<script src="scripts/HTMLInclude.min.js"></script>

</body>
</html>
