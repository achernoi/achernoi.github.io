<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/script.js"></script>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>
<body>

<div data-include="components/header.html"></div>

<main>
    <h1 style="text-align: left; color: rgb(27, 97, 27);">Contact Us</h1>
    <p>Have a gardening question, suggestion, or something you're stuck on? Whether you're trying your first plant or 
        you have a garden issue, feel free to reach out. Please fill out the form below to contact us:
    </p>
<form onsubmit="return validateForm()">
    <label >Enter your name:</label><br>
    <input type="text" id="name" placeholder="Your full name" style="padding: 4px;"><br>
    <label>Enter your email:</label><br>
    <input type="text" id="email" placeholder="yourname@example.com" style="padding: 4px;"><br>
    <label>Enter your message:</label><br>
    <textarea id="message" placeholder="Your message for us" style="padding: 4px;"></textarea><br>
    <input type="submit" value="Submit">
</form>
</main>

<div data-include="components/footer.html"></div>
<script src="scripts/HTMLInclude.min.js"></script>

</body>
</html>
