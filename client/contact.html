<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/script.js"></script>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>
<body>

<div data-include="components/header.html"></div>

<main>
    <h1 style="text-align: left; color: rgb(27, 97, 27);">Contact Us</h1>
    <p>Have a gardening question, suggestion, or something you're stuck on? Whether you're trying your first plant or 
        you have a garden issue, feel free to reach out. Please fill out the form below to contact us:
    </p>

    <form onsubmit="return validateForm()">
        <div class="form-group">
        <label for="name">Name: </label>
        <input
            id="name"
            name="name"
            type="text"
            placeholder="Your full name"
            required
            autocomplete="name"
            style="padding: 4px;"
        />
        <span class="field-msg" id="nameMsg"></span>
        </div>

        <div class="form-group">
        <label for="email">Email: </label>
        <input
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
            style="padding: 4px;"
        />
        <span class="field-msg" id="emailMsg"></span>
        </div>

        <div class="form-group">
        <label for="comments">
            Enter your message:
        </label>
        <textarea
            id="comments"
            name="comments"
            rows="4"
            placeholder="Your message for us..."
            style="width: 100%; resize: vertical"
        ></textarea>
        </div>
    <input type="submit" value="Submit">
</form>
</main>

<div data-include="components/footer.html"></div>
<script src="scripts/HTMLInclude.min.js"></script>

</body>
</html>
